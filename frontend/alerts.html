<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogiTwin — Alerts</title>
<style>
/* ============================================================
   LogiTwin — Global Styles (Light Theme)
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Segoe UI", sans-serif; color: #1e293b; display: flex; min-height: 100vh;
  background: radial-gradient(circle at 15% 25%, #60a5fa40, transparent 45%), radial-gradient(circle at 85% 70%, #a78bfa40, transparent 45%), radial-gradient(circle at 50% 80%, #38bdf840, transparent 40%), #f8fafc;
}
body::before {
  content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background-image: linear-gradient(#cbd5e166 1px, transparent 1px), linear-gradient(90deg, #cbd5e166 1px, transparent 1px);
  background-size: 60px 60px; z-index: -1;
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar {
  width: 220px; min-height: 100vh; background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 24px 16px; position: fixed; top: 0; left: 0; bottom: 0; box-shadow: 4px 0 20px rgba(99, 102, 241, 0.05); z-index: 1000;
}
.logo { font-size: 26px; font-weight: 900; color: #1e293b; margin-bottom: 36px; letter-spacing: 1px; }
.logo span { background: linear-gradient(90deg, #a855f7, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
nav { display: flex; flex-direction: column; gap: 8px; }
nav a { text-decoration: none; color: #64748b; padding: 10px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: 0.2s; }
nav a:hover, nav a.active { background: #eef2ff; color: #4f46e5; font-weight: 700; }

/* ── MAIN CONTENT ────────────────────────────────────────── */
.main { margin-left: 220px; flex: 1; padding: 24px 32px; max-width: 1000px; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.topbar h1 { font-size: 24px; font-weight: 800; color: #0f172a; }
.live-badge { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

/* ── EVENTS LIST ─────────────────────────────────────────── */
.card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 24px; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.05); }
.card-title { font-size: 14px; font-weight: 700; color: #475569; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }

.event-item {
  display: flex; align-items: center; gap: 16px; padding: 16px; border-bottom: 1px solid #f1f5f9; transition: 0.2s; border-radius: 8px;
}
.event-item:hover { background: #f8fafc; }

.event-time { color: #64748b; font-size: 13px; min-width: 50px; font-weight: 700; }
.event-badge { padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; min-width: 90px; text-align: center; }
.event-msg { color: #334155; font-size: 15px; font-weight: 500; flex: 1; }

.event-badge.disruption { background: #fee2e2; color: #dc2626; }
.event-badge.alert      { background: #ffedd5; color: #ea580c; }
.event-badge.info       { background: #e0f2fe; color: #0284c7; }

.sev-high   { border-left: 4px solid #ef4444; }
.sev-medium { border-left: 4px solid #f97316; }
.sev-low    { border-left: 4px solid #10b981; }
</style>
</head>
<body>

  <div class="sidebar">
    <div class="logo">Logi<span>Twin</span></div>
    <nav>
      <a href="dashboard.html">📊 Dashboard / Simulator</a>
      <a href="inventory.html">📦 Inventory Levels</a>
      <a href="vehicles.html">🚚 Active Vehicles</a>
      <a href="alerts.html" class="active">🔔 System Alerts</a>
      <a href="index.html">🚪 Logout</a>
    </nav>
  </div>

  <div class="main">
    <div class="topbar">
      <h1>System Alerts & Event Log</h1>
      <div class="live-badge">🟢 LIVE</div>
    </div>

    <div class="card">
      <div class="card-title">⏱️ Real-Time Supply Chain Feed</div>
      <div id="events-list">
        <div style="padding:20px; color:#94a3b8; font-size:14px; text-align:center;">Listening for events...</div>
      </div>
    </div>
  </div>

<script>
// This checks if you are running locally or on the web
const API_BASE = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
    ? "http://localhost:8080" 
    : "https://logitwin-api.onrender.com"; // <-- Put your live Go backend URL here later!

async function fetchAlerts() {
  try {
    const res = await fetch(`${API_BASE}/events`);
    const events = await res.json();

    const list = document.getElementById('events-list');
    list.innerHTML = events.map(e => {
        let sevClass = "sev-low";
        let badgeClass = "info";
        
        if (e.severity === "high" || e.type === "disruption") { sevClass = "sev-high"; badgeClass = "disruption"; }
        else if (e.severity === "medium" || e.type === "alert") { sevClass = "sev-medium"; badgeClass = "alert"; }

        return `
        <div class="event-item ${sevClass}">
            <span class="event-time">${e.time}</span>
            <span class="event-badge ${badgeClass}">${e.type}</span>
            <span class="event-msg">${e.message}</span>
        </div>`;
    }).join('');

  } catch (err) {
    console.error("Failed to load events:", err);
  }
}

fetchAlerts();
setInterval(fetchAlerts, 3000);
</script>
</body>
</html>
