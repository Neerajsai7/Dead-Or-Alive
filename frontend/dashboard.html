<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogiTwin — Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ============================================================
   LogiTwin — Global Styles (Light Theme)
   ============================================================ */

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

body {
  /* Set default small text to Lucida Bright */
  font-family: "Lucida Bright", Georgia, serif;
  color: #1e293b;
  display: flex;
  min-height: 100vh;
  /* Light gradient background */
  background:
    radial-gradient(circle at 15% 25%, #60a5fa40, transparent 45%),
    radial-gradient(circle at 85% 70%, #a78bfa40, transparent 45%),
    radial-gradient(circle at 50% 80%, #38bdf840, transparent 40%),
    #f8fafc;
}

/* Set headings, bold letters, and buttons to Cambria */
h1, h2, h3, h4, h5, h6, b, strong, button,
.logo, .topbar h1, .sim-title, .card-title, .kpi-value, .kpi-label,
.btn-disrupt, .btn-clear, nav a, .event-badge, .live-badge {
  font-family: Cambria, Georgia, serif;
}

/* Background Grid Pattern */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(#cbd5e166 1px, transparent 1px),
    linear-gradient(90deg, #cbd5e166 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: -1;
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar {
  width: 220px;
  min-height: 100vh;
  background: #ffffff;
  border-right: 1px solid #e2e8f0;
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  box-shadow: 4px 0 20px rgba(99, 102, 241, 0.05);
  z-index: 1000;
}

.logo {
  font-size: 26px;
  font-weight: 900;
  color: #1e293b;
  margin-bottom: 36px;
  letter-spacing: 1px;
}

.logo span {
  background: linear-gradient(90deg, #a855f7, #6366f1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

nav { display: flex; flex-direction: column; gap: 8px; }

nav a {
  text-decoration: none;
  color: #64748b;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  transition: 0.2s;
}

nav a:hover, nav a.active {
  background: #eef2ff;
  color: #4f46e5;
  font-weight: 700;
}

/* ── DISRUPTION PANEL ────────────────────────────────────── */
.sim-panel {
  margin-top: auto;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 14px;
}

.sim-title {
  font-size: 14px;
  font-weight: 700;
  color: #ea580c;
  margin-bottom: 10px;
}

.sim-panel select {
  width: 100%;
  padding: 8px;
  background: #ffffff;
  border: 1px solid #cbd5e1;
  color: #1e293b;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 8px;
  outline: none;
  font-family: "Lucida Bright", Georgia, serif;
}
.sim-panel select:focus { border-color: #818cf8; }

.btn-disrupt, .btn-clear {
  width: 100%;
  padding: 9px;
  border: none;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  font-size: 14px;
  margin-top: 6px;
  transition: 0.2s;
}

.btn-disrupt { background: #ef4444; color: white; }
.btn-disrupt:hover { background: #dc2626; }
.btn-clear   { background: #10b981; color: white; }
.btn-clear:hover   { background: #059669; }

/* ── MAIN CONTENT ────────────────────────────────────────── */
.main {
  margin-left: 220px;
  flex: 1;
  padding: 24px 32px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.topbar h1 {
  font-size: 26px;
  font-weight: 800;
  color: #0f172a;
}

.live-badge {
  background: #dcfce7;
  color: #16a34a;
  border: 1px solid #bbf7d0;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  animation: pulse 2s infinite;
  letter-spacing: 0.5px;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.6; }
}

/* ── CARDS (Unified Style) ───────────────────────────────── */
.card, .kpi-card {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(99, 102, 241, 0.05);
  transition: 0.2s;
}

/* ── KPI CARDS ───────────────────────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.kpi-card:hover { border-color: #a5b4fc; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.1); }
.kpi-card.warn  { border-color: #fdba74; }

.kpi-label {
  font-size: 13px;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  font-weight: 700;
}

.kpi-value {
  font-size: 30px;
  font-weight: 800;
  color: #6366f1; /* Primary Purple */
}

.kpi-card.warn .kpi-value { color: #ea580c; }

/* ── MID ROW (map + events) ──────────────────────────────── */
.card-title {
  font-size: 15px;
  font-weight: 700;
  color: #475569;
  margin-bottom: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.mid-row {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 16px;
  margin-bottom: 24px;
}

.map-card { padding: 0; overflow: hidden; display: flex; flex-direction: column; }
.map-card .card-title { padding: 20px 20px 0 20px; margin-bottom: 10px; }

#map {
  flex: 1;
  min-height: 400px;
  width: 100%;
  background: #e2e8f0;
  z-index: 1;
}

/* ── EVENTS ──────────────────────────────────────────────── */
.events-card {
  overflow-y: auto;
  max-height: 460px;
}

.event-item {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  padding: 12px 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: 14px;
}

.event-time { color: #64748b; font-size: 12px; min-width: 44px; font-weight: 700; }

.event-badge {
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.event-badge.disruption { background: #fee2e2; color: #dc2626; }
.event-badge.alert      { background: #ffedd5; color: #ea580c; }
.event-badge.info       { background: #e0f2fe; color: #0284c7; }

.event-msg { color: #334155; flex: 1; }

/* ── SEVERITY COLORS ─────────────────────────────────────── */
.sev-high   { border-left: 3px solid #ef4444; padding-left: 10px; }
.sev-medium { border-left: 3px solid #f97316; padding-left: 10px; }
.sev-low    { border-left: 3px solid #10b981; padding-left: 10px; }
</style>
</head>
<body>

  <div class="sidebar">
    <div class="logo">Logi<span>Twin</span></div>
    
    <nav>
      <a href="dashboard.html" class="active">📊 Dashboard / Simulator</a>
      <a href="inventory.html">📦 Inventory Levels</a>
      <a href="vehicles.html">🚚 Active Vehicles</a>
      <a href="alerts.html">🔔 System Alerts</a>
      <a href="index.html">🚪 Logout</a>
    </nav>

    <div class="sim-panel">
      <div class="sim-title">⚡ Disruption Simulator</div>
      <select id="disrupt-node">
        <option value="N003">Chennai Port</option>
        <option value="N002">Delhi Center</option>
        <option value="N001">Mumbai Hub</option>
      </select>
      <button class="btn-disrupt" onclick="triggerDisruption()">🔴 Disrupt Node</button>
      <button class="btn-clear" onclick="clearDisruption()">✅ Clear Status</button>
    </div>
  </div>

  <div class="main">
    
    <div class="topbar">
      <h1>Digital Twin Dashboard</h1>
      <div class="live-badge">🟢 LIVE</div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Active Vehicles</div>
        <div class="kpi-value" id="kpi-vehicles">—</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">On-Time Rate</div>
        <div class="kpi-value" id="kpi-ontime">—</div>
      </div>
      <div class="kpi-card" id="card-disrupt">
        <div class="kpi-label">Disruptions</div>
        <div class="kpi-value" id="kpi-disruptions">—</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Inventory Health</div>
        <div class="kpi-value" id="kpi-health">—</div>
      </div>
    </div>

    <div class="mid-row">
      
      <div class="card map-card">
        <div class="card-title">🗺️ Live Supply Chain Map</div>
        <div id="map"></div>
      </div>

      <div class="card events-card">
        <div class="card-title">🔔 Event Log</div>
        <div id="events-list">
          <div style="padding:20px; color:#94a3b8; font-size:13px; text-align:center;">Loading events...</div>
        </div>
      </div>
    </div>

  </div>

<script>
/*
// CHANGE THIS:
const API_BASE = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
    ? "http://localhost:8080" 
    : "https://logitwin-api.onrender.com"; 
*/

// TO THIS (Using your actual copied Render link):
const API_BASE = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
    ? "http://localhost:8080" 
    : "https://logitwin-api.onrender.com"; // <-- Paste your real Render link here! (No slash at the end)

// 1. Initialize Leaflet Map (Centered on India)
const map = L.map('map').setView([20.5937, 78.9629], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

// Layers to hold map items so we can clear them easily on every tick
let nodesLayer = L.layerGroup().addTo(map);
let routesLayer = L.layerGroup().addTo(map);
let vehiclesLayer = L.layerGroup().addTo(map);

// Fetch all data and update UI
async function updateDashboard() {
    try {
        // Fetch all endpoints simultaneously for speed
        const [healthRes, eventsRes, nodesRes, routesRes, vehiclesRes] = await Promise.all([
            fetch(`${API_BASE}/health`),
            fetch(`${API_BASE}/events`),
            fetch(`${API_BASE}/nodes`),
            fetch(`${API_BASE}/routes`),
            fetch(`${API_BASE}/vehicles`)
        ]);

        const health = await healthRes.json();
        const events = await eventsRes.json();
        const nodes = await nodesRes.json();
        const routes = await routesRes.json();
        const vehicles = await vehiclesRes.json();

        updateKPIs(health);
        updateEvents(events);
        updateMap(nodes, routes, vehicles);

    } catch (error) {
        console.error("Error fetching data from Go backend:", error);
    }
}

function updateKPIs(health) {
    document.getElementById('kpi-vehicles').textContent = health.activeVehicles;
    document.getElementById('kpi-ontime').textContent = health.onTimeRate.toFixed(1) + '%';
    document.getElementById('kpi-disruptions').textContent = health.disruptions;
    document.getElementById('kpi-health').textContent = health.inventoryHealth.toFixed(1) + '%';

    const disruptCard = document.getElementById('card-disrupt');
    if (health.disruptions > 0) {
        disruptCard.classList.add('warn');
    } else {
        disruptCard.classList.remove('warn');
    }
}

function updateEvents(events) {
    const list = document.getElementById('events-list');
    list.innerHTML = events.map(e => {
        // Map backend severity to our CSS classes
        let sevClass = "sev-low";
        let badgeClass = "info";
        
        if (e.severity === "high" || e.type === "disruption") { sevClass = "sev-high"; badgeClass = "disruption"; }
        else if (e.severity === "medium" || e.type === "alert") { sevClass = "sev-medium"; badgeClass = "alert"; }

        return `
        <div class="event-item ${sevClass}">
            <span class="event-time">${e.time}</span>
            <span class="event-badge ${badgeClass}">${e.type}</span>
            <span class="event-msg">${e.message}</span>
        </div>`;
    }).join('');
}

function updateMap(nodes, routes, vehicles) {
    // Clear old drawings
    nodesLayer.clearLayers();
    routesLayer.clearLayers();
    vehiclesLayer.clearLayers();

    // Create a dictionary of nodes so we can easily look up coordinates for drawing routes
    const nodeDict = {};

    // Draw Nodes (Warehouses, Depots, Hubs)
    nodes.forEach(n => {
        nodeDict[n.id] = [n.lat, n.lng];
        
        let color = "#4f46e5"; // Default Purple
        let radius = 8;
        
        if (n.status === "disrupted") {
            color = "#ef4444"; // Red
            radius = 12; // Make it bigger so it's obvious
        }

        L.circleMarker([n.lat, n.lng], {
            color: color,
            fillColor: color,
            fillOpacity: 0.8,
            radius: radius
        }).bindPopup(`<b>${n.name}</b><br>Type: ${n.type}<br>Status: ${n.status}`).addTo(nodesLayer);
    });

    // Draw Routes (Connecting lines)
    routes.forEach(r => {
        const startPos = nodeDict[r.from];
        const endPos = nodeDict[r.to];
        
        if (startPos && endPos) {
            let lineColor = "#cbd5e1"; // Light gray for normal routes
            let weight = 2;
            let dashArray = "5, 5"; // Dashed line

            if (r.status === "disrupted") {
                lineColor = "#ef4444"; // Red for disrupted routes
                weight = 3;
                dashArray = null; // Solid line
            }

            L.polyline([startPos, endPos], {
                color: lineColor,
                weight: weight,
                dashArray: dashArray
            }).addTo(routesLayer);
        }
    });

    // Draw Vehicles (Trucks & Planes moving along routes)
    vehicles.forEach(v => {
        if (v.status !== "idle") {
            let vColor = "#10b981"; // Green for on-time
            if (v.status === "delayed") vColor = "#f97316"; // Orange for delayed
            
            // Create a small colored dot for the vehicle
            L.circleMarker([v.lat, v.lng], {
                color: '#ffffff',
                weight: 2,
                fillColor: vColor,
                fillOpacity: 1,
                radius: 6
            }).bindPopup(`<b>Vehicle ${v.id}</b><br>Status: ${v.status}<br>ETA: ${v.eta}`).addTo(vehiclesLayer);
        }
    });
}

// ── Disruption Button Controls ─────────────────────────────
async function triggerDisruption() {
    const nodeId = document.getElementById('disrupt-node').value;
    await fetch(`${API_BASE}/disrupt`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ node_id: nodeId })
    });
    updateDashboard(); // Force an immediate refresh
}

async function clearDisruption() {
    const nodeId = document.getElementById('disrupt-node').value;
    await fetch(`${API_BASE}/disrupt/clear`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ node_id: nodeId })
    });
    updateDashboard(); // Force an immediate refresh
}

// Start the loop! Fetch data every 3 seconds
updateDashboard();
setInterval(updateDashboard, 3000);

</script>
</body>
</html>
