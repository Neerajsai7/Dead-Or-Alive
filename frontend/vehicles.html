<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogiTwin — Active Vehicles</title>
<style>
/* ============================================================
   LogiTwin — Global Styles (Light Theme)
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Lucida Bright", Georgia, serif; 
  color: #1e293b;
  display: flex;
  min-height: 100vh;
  background:
    radial-gradient(circle at 15% 25%, #60a5fa40, transparent 45%),
    radial-gradient(circle at 85% 70%, #a78bfa40, transparent 45%),
    radial-gradient(circle at 50% 80%, #38bdf840, transparent 40%),
    #f8fafc;
}

h1, h2, h3, h4, h5, h6, b, strong, button, th,
.logo, .topbar h1, .sim-title, .card-title, nav a, .live-badge, .v-id {
  font-family: Cambria, Georgia, serif;
}

body::before {
  content: ""; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background-image: linear-gradient(#cbd5e166 1px, transparent 1px), linear-gradient(90deg, #cbd5e166 1px, transparent 1px);
  background-size: 60px 60px; z-index: -1;
}

.sidebar { width: 220px; min-height: 100vh; background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 24px 16px; position: fixed; top: 0; left: 0; bottom: 0; box-shadow: 4px 0 20px rgba(99, 102, 241, 0.05); }
.logo { font-size: 26px; font-weight: 900; color: #1e293b; margin-bottom: 36px; letter-spacing: 1px; }
.logo span { background: linear-gradient(90deg, #a855f7, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
nav { display: flex; flex-direction: column; gap: 8px; }
nav a { text-decoration: none; color: #64748b; padding: 10px 14px; border-radius: 8px; font-size: 15px; font-weight: 600; transition: 0.2s; }
nav a:hover, nav a.active { background: #eef2ff; color: #4f46e5; font-weight: 700; }

.main { margin-left: 220px; flex: 1; padding: 24px 32px; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.topbar h1 { font-size: 26px; font-weight: 800; color: #0f172a; }
.live-badge { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; animation: pulse 2s infinite; letter-spacing: 0.5px; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

.v-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.v-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 20px; box-shadow: 0 10px 30px rgba(99, 102, 241, 0.05); transition: 0.2s; position: relative; }
.v-card:hover { transform: translateY(-3px); border-color: #a5b4fc; }
.v-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.v-id { font-size: 18px; font-weight: 800; color: #1e293b; }
.v-status { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 10px; text-transform: uppercase; }
.status-transit { background: #e0f2fe; color: #0284c7; }
.status-delayed { background: #ffedd5; color: #ea580c; }
.status-idle    { background: #f1f5f9; color: #64748b; }

.v-info { display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: #475569; }
.v-info b { color: #1e293b; }
.v-progress-container { margin-top: 16px; }
.v-progress-bar { height: 6px; background: #f1f5f9; border-radius: 4px; overflow: hidden; margin-top: 6px; }
.v-progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a855f7); width: 0%; transition: width 1s ease-in-out; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">Logi<span>Twin</span></div>
  <nav>
    <a href="dashboard.html">📊 Dashboard / Sim</a>
    <a href="inventory.html">📦 Inventory Levels</a>
    <a href="vehicles.html" class="active">🚚 Active Vehicles</a>
    <a href="alerts.html">🔔 System Alerts</a>
    <a href="index.html">🚪 Logout</a>
  </nav>
</div>

<div class="main">
  <div class="topbar">
    <h1>Fleet Management</h1>
    <div class="live-badge">🟢 LIVE</div>
  </div>

  <div id="vehicle-grid" class="v-grid">
    <div style="padding:40px; color:#94a3b8; text-align:center; grid-column:1/-1;">Connecting to fleet...</div>
  </div>
</div>

<script>
// ⚠️ PASTE YOUR RENDER URL HERE
const API_BASE = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
    ? "http://localhost:8080" 
    : "https://logitwin-api-xxxx.onrender.com"; 

async function fetchVehicles() {
  try {
    const response = await fetch(`${API_BASE}/vehicles`);
    const vehicles = await response.json();
    renderVehicles(vehicles);
  } catch (error) {
    console.error("Failed to fetch vehicles:", error);
  }
}

function renderVehicles(vehicles) {
  const grid = document.getElementById('vehicle-grid');
  grid.innerHTML = vehicles.map(v => {
    const statusClass = v.status === 'in-transit' ? 'status-transit' : (v.status === 'delayed' ? 'status-delayed' : 'status-idle');
    const progress = v.status === 'idle' ? 0 : (v.status === 'delayed' ? 45 : 75); // Mock progress based on status

    return `
      <div class="v-card">
        <div class="v-header">
          <div class="v-id">Unit: ${v.id}</div>
          <span class="v-status ${statusClass}">${v.status}</span>
        </div>
        <div class="v-info">
          <div><b>📍 Position:</b> ${v.lat.toFixed(4)}, ${v.lng.toFixed(4)}</div>
          <div><b>⏱️ ETA:</b> ${v.eta || 'N/A'}</div>
        </div>
        <div class="v-progress-container">
          <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:700; color:#64748b;">
            <span>Route Progress</span>
            <span>${progress}%</span>
          </div>
          <div class="v-progress-bar">
            <div class="v-progress-fill" style="width: ${progress}%"></div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

fetchVehicles();
setInterval(fetchVehicles, 3000);
</script>
</body>
</html>
